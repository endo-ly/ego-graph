name: Deploy Backend

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "egograph/backend/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/deploy-backend.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python 3.13
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --all-packages

      - name: Run backend tests
        run: |
          cd egograph/backend
          uv run pytest tests/ -v --cov=backend --cov-report=xml --cov-report=term
        env:
          R2_ENDPOINT_URL: https://example.invalid
          R2_ACCESS_KEY_ID: test
          R2_SECRET_ACCESS_KEY: test
          R2_BUCKET_NAME: test-bucket

  deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6

      - name: Join Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -euo pipefail
            cd /opt/egograph/repo
            git fetch origin main
            git checkout main
            git reset --hard origin/main
            /root/.local/bin/uv sync --all-packages
            sudo systemctl restart egograph-backend
            for i in $(seq 1 10); do
              if curl -fsS http://127.0.0.1:8000/health; then
                echo "Health check passed"
                exit 0
              fi
              sleep 2
            done
            echo "=== Health check failed after 20s ==="
            sudo journalctl -u egograph-backend --since "1 min ago" --no-pager
            exit 1
